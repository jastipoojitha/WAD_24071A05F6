<!DOCTYPE html>
<html>
<head>
    <title>Student Rank Calculator</title>
</head>
<body>

    <h2>Enter Student Marks</h2>

    <form action="MarksServlet" method="post">

        Student Name:
        <input type="text" name="name" required>
        <br><br>

        Subject 1:
        <input type="number" name="m1" min="0" max="100" required>
        <br><br>

        Subject 2:
        <input type="number" name="m2" min="0" max="100" required>
        <br><br>

        Subject 3:
        <input type="number" name="m3" min="0" max="100" required>
        <br><br>

        Subject 4:
        <input type="number" name="m4" min="0" max="100" required>
        <br><br>

        Subject 5:
        <input type="number" name="m5" min="0" max="100" required>
        <br><br>

        <input type="submit" value="Calculate Rank">

    </form>

    <hr>
    <footer>Jasti Poojitha (24071A05F6)</footer>

</body>
</html>
